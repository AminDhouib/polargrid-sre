x-service-defaults: &defaults
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped

services:
  vancouver:
    <<: *defaults
    container_name: polargrid-vancouver
    ports:
      - "8001:8000"
    env_file: configs/vancouver.env

  toronto:
    <<: *defaults
    container_name: polargrid-toronto
    ports:
      - "8002:8000"
    env_file: configs/toronto.env

  london:
    <<: *defaults
    container_name: polargrid-london
    ports:
      - "8003:8000"
    env_file: configs/london.env

  frankfurt:
    <<: *defaults
    container_name: polargrid-frankfurt
    ports:
      - "8004:8000"
    env_file: configs/frankfurt.env

  singapore:
    <<: *defaults
    container_name: polargrid-singapore
    ports:
      - "8005:8000"
    env_file: configs/singapore.env

  prometheus:
    image: prom/prometheus:latest
    container_name: polargrid-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: polargrid-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=polargrid
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
